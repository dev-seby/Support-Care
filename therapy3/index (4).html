<section id="settings">
  <h2>Account Settings</h2>

  <form action="/save-settings" method="post">

    <h3>Profile Information</h3>

    <label for="username">Username:</label><br>
    <input type="text" id="username" name="username" value="John123"><br><br>

    <label for="email">Email:</label><br>
    <input type="email" id="email" name="email" value="john@email.com"><br><br>

    <label for="password">Change Password:</label><br>
    <input type="password" id="password" name="password" placeholder="New password"><br><br>

    <h3>Preferences</h3>

    <label>
      <input type="checkbox" name="notifications" checked>
      Enable Notifications
    </label><br><br>

    <label for="language">Language:</label><br>
    <select id="language" name="language">
      <option value="en">English</option>
      <option value="fr">French</option>
      <option value="ht">Creole</option>
    </select><br><br>

    <h3>Privacy</h3>

    <label>
      <input type="checkbox" name="public_profile">
      Make Profile Public
    </label><br><br>

    <input type="submit" value="Save Changes">

  </form>
</section>
