<section id="contact">
  <h2>Contact Us</h2>

  <p><strong>Address:</strong> 123 Health Street, City, Country</p>
  <p><strong>Phone:</strong> +123 456 7890</p>
  <p><strong>Email:</strong> contact@hospital.com</p>

  <h3>Send us a message</h3>
  <form action="/submit" method="post">
    
    <label for="name">Full Name:</label><br>
    <input type="text" id="name" name="name" placeholder="Your name" required><br><br>

    <label for="email">Email:</label><br>
    <input type="email" id="email" name="email" placeholder="Your email" required><br><br>

    <label for="message">Message:</label><br>
    <textarea id="message" name="message" rows="5" cols="30" placeholder="Write your message here" required></textarea><br><br>

    <input type="submit" value="Send Message">
  </form>
</section>
